<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>E-learning &middot; MOCM / OTSS+ &middot; NMCP Sierra Leone</title>
<meta name="theme-color" content="#2b5f8a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --blue:#3b78a8; --blue-dark:#2b5f8a; --blue-light:#4a8dbf; --blue-900:#1e4a6d;
    --gold:#ffc107; --gold-600:#e0a800;
    --green:#28a745; --red:#dc3545; --orange:#d1671a;
    --ink:#1a2c3e; --muted:#6c7a8a; --line:#e0e6ed; --bg:#f0f2f5; --white:#fff;
    --sh-sm:0 2px 8px rgba(43,95,138,.08);
    --sh-md:0 12px 30px rgba(43,95,138,.14);
    --sh-lg:0 26px 60px rgba(30,74,109,.30);
    --disp:'Oswald',system-ui,sans-serif;
    --body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:var(--body);color:var(--ink);background:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px 16px;}
  a{text-decoration:none;color:inherit;}

  /* PHONE MOCKUP */
  .stage{display:flex;flex-direction:column;align-items:center;gap:14px;max-width:100%;}
  .phone{width:360px;max-width:92vw;height:780px;max-height:84vh;background:#0e2740;border-radius:44px;padding:11px;box-shadow:var(--sh-lg);}
  .screen{position:relative;width:100%;height:100%;background:var(--bg);border-radius:34px;overflow:hidden;display:flex;flex-direction:column;}
  @media(max-width:820px){ .phone{height:82vh;} }

  /* ---- fit the screen it is opened on ---- */
  @media(max-width:640px){
    body{padding:0;}
    .stage{gap:0;width:100%;}
    .phone{width:100%;max-width:none;height:100vh;height:100dvh;max-height:none;
      padding:0;border-radius:0;box-shadow:none;background:var(--bg);}
    .screen{border-radius:0;}
    .top .logo{height:32px;}
  }
  @media(min-width:641px) and (max-height:760px){
    .phone{height:94vh;max-height:none;}
  }
  @media(min-width:1100px) and (min-height:900px){
    .phone{width:390px;height:840px;}
  }

  /* TOP BAR */
  .top{flex:0 0 auto;background:var(--white);border-bottom:3px solid var(--blue);display:flex;align-items:center;gap:10px;padding:11px 14px;box-shadow:var(--sh-sm);z-index:10;}
  .top .logo{height:36px;width:auto;display:block;}
  .top .brand{border-left:2px solid var(--line);padding-left:10px;min-width:0;}
  .top .brand .n{font:600 13px/1 var(--disp);letter-spacing:.04em;color:var(--blue-dark);text-transform:uppercase;}
  .top .brand .s{font:500 8.5px/1.2 var(--body);color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .top .home-link{margin-left:auto;font:600 11px var(--body);color:var(--blue-dark);display:none;align-items:center;gap:5px;cursor:pointer;padding:7px 10px;border-radius:9px;border:1.5px solid var(--line);background:none;flex:0 0 auto;}
  .top .home-link.show{display:inline-flex;}

  /* SCROLL BODY */
  .body{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}

  /* HERO */
  .hero{background:linear-gradient(155deg,var(--blue) 0%,var(--blue-dark) 55%,var(--blue-900) 100%);color:#fff;border-radius:0 0 24px 24px;position:relative;overflow:hidden;padding:22px 18px 26px;}
  .hero::after{content:"";position:absolute;right:-50px;top:-60px;width:170px;height:170px;border-radius:50%;background:rgba(255,193,7,.14);}
  .hero .tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.24);padding:5px 11px;border-radius:99px;font:600 9px var(--body);letter-spacing:.06em;text-transform:uppercase;position:relative;}
  .hero .tag .g{width:6px;height:6px;border-radius:50%;background:var(--gold);}
  .hero h1{font:600 22px/1.18 var(--disp);letter-spacing:.01em;margin:12px 0 10px;position:relative;}
  .hero h1 span{color:var(--gold);}
  .hero p{font:400 12px/1.6 var(--body);color:rgba(255,255,255,.92);position:relative;}
  .hero .stats{display:flex;gap:20px;margin-top:18px;position:relative;}
  .hero .stats .v{font:700 19px/1 var(--disp);color:var(--gold);}
  .hero .stats .k{font:500 9.5px var(--body);color:rgba(255,255,255,.82);margin-top:4px;}

  .wrap{padding:0 15px;}

  /* STATUS ROW */
  .status-row{display:flex;align-items:center;justify-content:space-between;background:var(--white);border:1px solid var(--line);border-radius:14px;padding:9px 14px;margin-top:16px;box-shadow:var(--sh-sm);}
  .status-left{display:flex;align-items:center;gap:8px;}
  .status-dot{width:8px;height:8px;border-radius:8px;}
  .status-dot.online{background:var(--green);box-shadow:0 0 0 2px rgba(40,167,69,.15);}
  .status-dot.offline{background:#9ca3af;}
  .status-text{font:500 12px var(--body);color:var(--ink);}
  .status-badge{font:700 9.5px var(--body);letter-spacing:.06em;padding:4px 12px;border-radius:20px;background:#e8f5e9;color:var(--green);}

  /* SECTION HEAD */
  .sec-head{display:flex;align-items:baseline;gap:10px;margin:20px 2px 14px;}
  .sec-head h2{font:600 17px/1 var(--disp);letter-spacing:.03em;color:var(--blue-dark);text-transform:uppercase;}
  .sec-head .bar{flex:1;height:2px;background:var(--line);}
  .sec-head .count{font:600 10.5px var(--body);color:var(--muted);}

  /* MODULE CARDS */
  .grid{display:flex;flex-direction:column;gap:12px;padding-bottom:24px;}
  .mod{background:var(--white);border:1px solid var(--line);border-radius:15px;box-shadow:var(--sh-sm);cursor:pointer;overflow:hidden;position:relative;transition:transform .12s,box-shadow .2s;}
  .mod::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--accent,var(--blue));}
  .mod:active{transform:scale(.99);background:#fafcff;}
  .mod .body2{padding:15px 15px 15px 19px;}
  .mod .num{font:700 10px var(--disp);letter-spacing:.12em;color:var(--gold-600);}
  .mod h3{font:600 16px/1.22 var(--disp);color:var(--ink);margin:5px 0 7px;}
  .mod p{font:400 11.5px/1.5 var(--body);color:var(--muted);}
  .mod .foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:11px;border-top:1px solid var(--line);}
  .mod .foot .sub{font:700 10.5px var(--body);color:var(--gold-600);letter-spacing:.01em;}
  .mod .foot .go{display:inline-flex;align-items:center;gap:5px;font:700 12px var(--body);color:var(--gold-600);}
  .mod .foot .go svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round;}

  /* MODULE DETAIL */
  .detail{padding-bottom:26px;animation:fade .3s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .dhero{background:linear-gradient(150deg,var(--blue),var(--blue-900));color:#fff;border-radius:16px;padding:18px;margin:16px 0;position:relative;overflow:hidden;}
  .dhero::after{content:"";position:absolute;right:-40px;top:-50px;width:130px;height:130px;border-radius:50%;background:rgba(255,193,7,.16);}
  .dhero .num{font:700 10px var(--disp);letter-spacing:.14em;color:var(--gold);position:relative;}
  .dhero h2{font:600 20px/1.18 var(--disp);margin:6px 0 8px;position:relative;}
  .dhero p{font:400 12px/1.6 var(--body);color:rgba(255,255,255,.9);position:relative;}

  /* SUB-MODULE CARDS */
  .subs{display:flex;flex-direction:column;gap:11px;}
  .sub-card{background:var(--white);border:1px solid var(--line);border-radius:15px;box-shadow:var(--sh-sm);padding:16px;display:flex;flex-direction:column;}
  .sub-card .ic{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;margin-bottom:11px;}
  .ic svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  .ic.ppt{background:#fdeede;color:var(--orange);}
  .ic.vid{background:#e7f3ff;color:var(--blue-dark);}
  .ic.ass{background:#fff6d9;color:var(--gold-600);}
  .ic.dat{background:#e4f5ec;color:var(--green);}
  .sub-card .step{font:700 10px var(--disp);letter-spacing:.1em;color:var(--muted);}
  .sub-card h4{font:600 16px/1.2 var(--disp);margin:4px 0 6px;}
  .sub-card p{font:400 11.5px/1.5 var(--body);color:var(--muted);margin-bottom:13px;}
  .sub-card .btn{margin-top:auto;border:none;border-radius:11px;padding:12px 14px;font:600 13px var(--body);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:filter .2s,transform .08s;}
  .sub-card .btn:active{transform:translateY(1px);}
  .btn-blue{background:var(--blue-dark);color:#fff;}
  .btn-gold{background:var(--gold);color:var(--blue-900);}
  .btn-green{background:var(--green);color:#fff;}
  .btn-orange{background:var(--orange);color:#fff;}
  .btn .lk{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;}

  /* VIDEO PLAYER */
  .player{background:#000;border-radius:15px;overflow:hidden;box-shadow:var(--sh-md);display:none;}
  .player.show{display:block;animation:fade .3s ease;}
  .player video{width:100%;display:block;max-height:40vh;background:#000;}
  .player .pbar{background:var(--blue-900);color:#fff;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;font:600 11px var(--body);gap:10px;}
  .player .pbar button{background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:5px 10px;font:600 11px var(--body);cursor:pointer;flex:0 0 auto;}

  /* IN-PHONE FOOTER */
  .foot{background:var(--blue-900);color:rgba(255,255,255,.72);text-align:center;padding:18px;font:400 10.5px var(--body);letter-spacing:.3px;}
  .foot b{color:var(--gold);font-weight:600;}

  /* DOC VIEWER — sits inside the phone screen */
  .docviewer{position:absolute;inset:0;background:var(--bg);z-index:60;display:none;flex-direction:column;}
  .docviewer.show{display:flex;}
  .dvbar{flex:0 0 auto;background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:#fff;padding:11px 13px;display:flex;align-items:center;justify-content:space-between;gap:10px;font:600 11.5px var(--body);}
  .dvbar .dvtitle{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .dvbar button{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:9px;padding:7px 12px;font:600 11px var(--body);cursor:pointer;flex:0 0 auto;}
  .docviewer .dvframe{flex:1 1 auto;width:100%;border:none;background:var(--bg);display:none;}
  .docviewer .pdfscroll{flex:1 1 auto;width:100%;overflow:auto;background:#4a5561;padding:10px;display:none;}
  .docviewer.pdf .pdfscroll{display:block;}
  .docviewer.html .dvframe{display:block;}
  .pdfscroll canvas{display:block;max-width:100%;height:auto;background:#fff;}
  .pdfscroll .pdfpage{margin:0 auto 10px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.4);}
  .dvmsg{color:#eef3f8;font:500 12.5px/1.55 var(--body);padding:16px;text-align:center;}

  /* LOGIN MODAL — also inside the phone screen */
  .login-overlay{display:none;position:absolute;inset:0;background:rgba(30,74,109,.78);backdrop-filter:blur(3px);z-index:120;align-items:center;justify-content:center;padding:18px;}
  .login-sheet{background:var(--white);border-radius:22px;width:100%;max-width:300px;padding:22px 18px 24px;text-align:center;box-shadow:0 24px 40px rgba(0,0,0,.28);}
  .login-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--blue-dark),var(--blue));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
  .login-icon svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;}
  .login-title{font:600 17px/1.2 var(--disp);letter-spacing:.02em;color:var(--blue-dark);text-transform:uppercase;margin-bottom:5px;}
  .login-lbl{font:400 11px var(--body);color:var(--muted);margin-bottom:14px;}
  .login-input{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:12px;font:400 13px var(--body);margin-bottom:10px;background:var(--white);color:var(--ink);}
  .login-input:focus{border-color:var(--blue);outline:2px solid rgba(59,120,168,.2);outline-offset:1px;}
  .login-error{color:var(--red);font:500 10px var(--body);margin-bottom:12px;display:none;}
  .login-btns{display:flex;gap:10px;margin-top:6px;}
  .login-cancel,.login-submit{flex:1;padding:12px;border-radius:11px;font:600 12.5px var(--body);cursor:pointer;}
  .login-cancel{background:var(--bg);color:var(--muted);border:1px solid var(--line);}
  .login-submit{background:var(--blue-dark);color:#fff;border:none;}

  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-2px)}}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms !important;transition-duration:.01ms !important;}}
</style>
</head>
<body>

<div class="stage">
  <div class="phone"><div class="screen">

    <!-- TOP BAR -->
    <header class="top">
      <img src="NMCP.png" class="logo" alt="NMCP" onerror="this.style.display='none'">
      <div class="brand">
        <div class="n">NMCP</div>
        <div class="s">National Malaria Control Programme &middot; SL</div>
      </div>
      <button class="home-link" id="backLink">&larr; Modules</button>
    </header>

    <!-- SCROLLING BODY -->
    <div class="body" id="scroll">
      <div id="view"></div>
      <div class="foot">&copy; <span id="year">2026</span> <b>ICF-SL</b> &middot; MOCM / OTSS+ Training &amp; Data Collection Portal</div>
    </div>

    <!-- DOC VIEWER -->
    <div class="docviewer" id="docViewer">
      <div class="dvbar">
        <span class="dvtitle" id="dvTitle">Presentation</span>
        <button onclick="closeDoc()">Close &times;</button>
      </div>
      <div class="pdfscroll" id="pdfScroll"></div>
      <iframe class="dvframe" id="dvFrame" title="viewer"></iframe>
    </div>

    <!-- LOGIN MODAL -->
    <div class="login-overlay" id="loginOverlay">
      <div class="login-sheet">
        <div class="login-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
        <div class="login-title">Authentication Required</div>
        <div class="login-lbl" id="loginLabel">Enter credentials to continue</div>
        <input type="text" class="login-input" id="loginUsername" placeholder="Username" autocomplete="off">
        <input type="password" class="login-input" id="loginPassword" placeholder="Password" onkeydown="if(event.key==='Enter') submitLogin()">
        <div class="login-error" id="loginErrorMsg">Invalid username or password.</div>
        <div class="login-btns">
          <button class="login-cancel" onclick="closeLoginModal()">Cancel</button>
          <button class="login-submit" onclick="submitLogin()">Unlock</button>
        </div>
      </div>
    </div>

  </div></div>
</div>

<script>
/* ================= CONFIGURATION ================= */

/* One module per MOCM form. Every file is named after the form, all in the
   same folder as index.html — no sub-folders. */
var MODULES = [
  {letter:"A", accent:"#3b78a8", title:"Facility Profile",
   desc:"PHU identification, location and staff details.",
   pres:"form-a-presentation.pdf", video:"form-a-video.mp4", assessment:"form-a-assessment.html", data:"form_a.html"},

  {letter:"B", accent:"#2b5f8a", title:"HF Readiness",
   desc:"Capacity, supplies, tools and referral readiness.",
   pres:"form-b-presentation.pdf", video:"form-b-video.mp4", assessment:"form-b-assessment.html", data:"form_b.html"},

  {letter:"C", accent:"#4a8dbf", title:"Case Management",
   desc:"RDT, ACT and treatment compliance at the facility.",
   pres:"form-c-presentation.pdf", video:"form-c-video.mp4", assessment:"form-c-assessment.html", data:"form_c.html"},

  {letter:"D", accent:"#28a745", title:"Data Quality",
   desc:"HMIS register review and data verification.",
   pres:"form-d-presentation.pdf", video:"form-d-video.mp4", assessment:"form-d-assessment.html", data:"form_d.html"},

  {letter:"E", accent:"#fd7e14", title:"Community Services",
   desc:"IPTp, ITN distribution and outreach activities.",
   pres:"form-e-presentation.pdf", video:"form-e-video.mp4", assessment:"form-e-assessment.html", data:"form_e.html"},

  {letter:"F", accent:"#9c27b0", title:"Referral System",
   desc:"Severe malaria referral pathway and follow-up.",
   pres:"form-f-presentation.pdf", video:"form-f-video.mp4", assessment:"form-f-assessment.html", data:"form_f.html"},

  {letter:"G", accent:"#ffc107", title:"Supervisor Feedback & Action Plan",
   desc:"Ratings, gaps and agreed corrective actions.",
   pres:"form-g-presentation.pdf", video:"form-g-video.mp4", assessment:"form-g-assessment.html", data:"form_g.html"},

  {letter:"H", accent:"#17a2b8", title:"Laboratory",
   desc:"Microscopy, RDT quality control, reagents and lab records.",
   pres:"form-h-presentation.pdf", video:"form-h-video.mp4", assessment:"form-h-assessment.html", data:"form_h.html"},

  {letter:"I", accent:"#e83e8c", title:"Perennial Malaria Chemoprevention (PMC)",
   desc:"Formerly Intermittent Preventive Treatment in Infants (IPTi). Eligibility, doses and recording.",
   pres:"form-i-presentation.pdf", video:"form-i-video.mp4", assessment:"form-i-assessment.html", data:"form_i.html"},

  {letter:"J", accent:"#6f42c1", title:"Malaria Vaccine (RTS,S) Administration",
   desc:"RTS,S dose schedule, cold chain, wastage and recording.",
   pres:"form-j-presentation.pdf", video:"form-j-video.mp4", assessment:"form-j-assessment.html", data:"form_j.html"}
];

var SUBS = [
  {key:"ppt", ic:"ppt", cls:"btn-orange", step:"Sub-module 1",
   title:"Presentation", desc:"Slide walkthrough of the form and the supervision workflow.", btn:"Open presentation"},
  {key:"video", ic:"vid", cls:"btn-blue", step:"Sub-module 2",
   title:"Video", desc:"Recorded demonstration (.mp4) of how to complete the form.", btn:"Play video"},
  {key:"assessment", ic:"ass", cls:"btn-gold", step:"Sub-module 3",
   title:"Assessment", desc:"Short assessment to confirm understanding before fieldwork.", btn:"Start assessment"},
  {key:"data", ic:"dat", cls:"btn-green", step:"Sub-module 4",
   title:"Data Collection", desc:"Launch the live supervision form used at the facility.", btn:"Open data collection"}
];

/* Stylesheet applied to every HTML page opened in the viewer */
var THEME_CSS = "elearning-theme.css";

/* Set to true to ask for a username and password before the
   data collection step. false = every file opens straight away. */
var REQUIRE_LOGIN = false;

/* Credentials used only when REQUIRE_LOGIN is true */
var FORM_CREDENTIALS = {
  "A": { username: "supervisor", password: "mocm2026" },
  "B": { username: "supervisor", password: "mocm2026" },
  "C": { username: "supervisor", password: "mocm2026" },
  "D": { username: "supervisor", password: "mocm2026" },
  "E": { username: "supervisor", password: "mocm2026" },
  "F": { username: "supervisor", password: "mocm2026" },
  "G": { username: "supervisor", password: "mocm2026" },
  "H": { username: "supervisor", password: "mocm2026" },
  "I": { username: "supervisor", password: "mocm2026" },
  "J": { username: "supervisor", password: "mocm2026" }
};

/* ================= ICONS ================= */
var IC = {
  ppt:'<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M12 17v4M8 21h8"/><path d="M7 11l3-2 3 3 4-4"/></svg>',
  vid:'<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M10 9l5 3-5 3z" fill="currentColor" stroke="none"/></svg>',
  ass:'<svg viewBox="0 0 24 24"><path d="M9 11l2 2 4-4"/><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M9 3v2h6V3"/></svg>',
  dat:'<svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M9 6h6M9 10h6M9 14h4"/></svg>',
  arrow:'<svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>',
  lock:'<svg class="lk" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>'
};

function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}

/* ================= STATE ================= */
var view = document.getElementById("view");
var scroller = document.getElementById("scroll");
var backLink = document.getElementById("backLink");
var currentModule = null;
var pendingModuleIndex = null;

var unlockedForms = {};
try {
  var saved = sessionStorage.getItem("mocm_unlocked_final");
  if (saved) unlockedForms = JSON.parse(saved);
} catch(e) {}

/* ================= HOME ================= */
function homeHTML(){
  var cards = MODULES.map(function(m,i){
    return '<div class="mod" style="--accent:'+m.accent+'" onclick="goModule('+i+')"><div class="body2">'+
      '<div class="num">MODULE '+m.letter+'</div>'+
      '<h3>'+esc(m.title)+'</h3><p>'+esc(m.desc)+'</p>'+
      '<div class="foot"><span class="sub">'+SUBS.length+' sub-modules</span>'+
      '<span class="go">Open '+IC.arrow+'</span></div>'+
    '</div></div>';
  }).join("");

  return '<section class="hero">'+
      '<span class="tag"><span class="g"></span>MOCM / OTSS+ &middot; Sierra Leone 2026</span>'+
      '<h1>E-learning for <span>Supportive Supervision &amp; Readiness Assessment</span></h1>'+
      '<p>Open a module to find its presentation, a demo video, a readiness assessment, and the live data collection form in order. Built by ICF-SL for NMCP Sierra Leone.</p>'+
      '<div class="stats">'+
        '<div class="st"><div class="v">'+MODULES.length+'</div><div class="k">Modules</div></div>'+
        '<div class="st"><div class="v">'+SUBS.length+'</div><div class="k">Steps each</div></div>'+
        '<div class="st"><div class="v">'+MODULES[0].letter+'&ndash;'+MODULES[MODULES.length-1].letter+'</div><div class="k">Forms</div></div>'+
      '</div>'+
    '</section>'+
    '<div class="wrap">'+
      '<div class="status-row">'+
        '<div class="status-left"><div class="status-dot online" id="statusDot"></div>'+
        '<div class="status-text" id="statusTxt">System ready</div></div>'+
        '<div class="status-badge" id="statusBadge">ONLINE</div>'+
      '</div>'+
      '<div class="sec-head"><h2>Modules</h2><span class="bar"></span><span class="count">'+MODULES.length+'</span></div>'+
      '<div class="grid">'+cards+'</div>'+
    '</div>';
}

/* ================= MODULE DETAIL ================= */
function moduleHTML(i){
  var m = MODULES[i];
  var subs = SUBS.map(function(s){
    var locked = (REQUIRE_LOGIN && s.key === "data" && FORM_CREDENTIALS[m.letter] && !unlockedForms[m.letter]);
    return '<div class="sub-card"><div class="ic '+s.ic+'">'+IC[s.ic]+'</div>'+
      '<div class="step">'+esc(s.step)+'</div>'+
      '<h4>'+esc(s.title)+'</h4><p>'+esc(s.desc)+'</p>'+
      '<button class="btn '+s.cls+'" onclick="openSub(\''+s.key+'\','+i+')">'+
        (locked ? IC.lock : '')+esc(s.btn)+'</button>'+
    '</div>';
  }).join("");

  return '<div class="wrap"><div class="detail">'+
    '<div class="dhero"><div class="num">MODULE '+m.letter+'</div>'+
      '<h2>'+esc(m.title)+'</h2><p>'+esc(m.desc)+'</p></div>'+
    '<div class="subs">'+subs+
      '<div class="player" id="player"><div class="pbar">'+
        '<span>Video &middot; '+esc(m.title)+'</span>'+
        '<button onclick="closePlayer()">Close &times;</button></div>'+
        '<video id="playerVideo" controls preload="metadata"></video></div>'+
    '</div></div></div>';
}

/* ================= NAVIGATION ================= */
function goHome(){
  currentModule = null;
  view.innerHTML = homeHTML();
  backLink.classList.remove("show");
  updateOnlineStatus();
  scroller.scrollTop = 0;
}

function goModule(i){
  currentModule = i;
  view.innerHTML = moduleHTML(i);
  backLink.classList.add("show");
  scroller.scrollTop = 0;
}

backLink.onclick = goHome;

/* ================= SUB-MODULES ================= */
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
}

function subByKey(key){
  for (var i = 0; i < SUBS.length; i++) if (SUBS[i].key === key) return SUBS[i];
  return null;
}

function subUrl(m, s){
  return (s.key === "ppt") ? m.pres : m[s.key];
}

function openSub(key, i){
  var m = MODULES[i], s = subByKey(key);
  if (!m || !s) return;

  if (key === "video") {
    var player = document.getElementById("player");
    var vid = document.getElementById("playerVideo");
    player.classList.add("show");
    vid.src = subUrl(m, s);
    player.scrollIntoView({behavior:"smooth", block:"center"});
    vid.play().catch(function(){});
    return;
  }

  if (REQUIRE_LOGIN && key === "data") {
    var creds = FORM_CREDENTIALS[m.letter];
    if (creds && (creds.username || creds.password) && !unlockedForms[m.letter]) {
      requestLogin(i);
      return;
    }
  }

  openDoc(key === "ppt" ? "pdf" : "html", s.title + " \u00B7 " + m.title, subUrl(m, s), 0);
}

/* ================= DOC VIEWER ================= */
function openDoc(kind, title, url, depth){
  var dv = document.getElementById("docViewer");
  document.getElementById("dvTitle").textContent = title;
  dv.classList.remove("pdf","html");
  dv.classList.add(kind, "show");

  if (kind === "pdf") {
    document.getElementById("dvFrame").src = "about:blank";
    _pdfUrl = url;
    renderPdf(document.getElementById("pdfScroll"), url);
  } else {
    document.getElementById("pdfScroll").innerHTML = "";
    var frame = document.getElementById("dvFrame");
    frame.onload = function(){ themeFrame(frame, 0); };
    frame.src = url;
  }
}

/* Drop the shared e-learning stylesheet into the page inside the viewer.
   Works when the portal and the form are served from the same origin
   (a web server or GitHub Pages); silently skipped otherwise. */
function themeFrame(frame, depth){
  try {
    var doc = frame.contentDocument;
    if (!doc || !doc.head) return;
    if (doc.getElementById("mocm-theme")) return;

    var fonts = doc.createElement("link");
    fonts.rel = "stylesheet";
    fonts.href = "https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap";
    doc.head.appendChild(fonts);

    var prefix = "";
    for (var d = 0; d < depth; d++) prefix += "../";

    var css = doc.createElement("link");
    css.id = "mocm-theme";
    css.rel = "stylesheet";
    css.href = prefix + THEME_CSS;
    doc.head.appendChild(css);
  } catch(e) { /* cross-origin or file:// — the page keeps its own styling */ }
}

var _pdfUrl = null, _reflowT = null;
window.addEventListener("resize", function(){
  var dv = document.getElementById("docViewer");
  if (!dv.classList.contains("show") || !dv.classList.contains("pdf") || !_pdfUrl) return;
  clearTimeout(_reflowT);
  _reflowT = setTimeout(function(){ renderPdf(document.getElementById("pdfScroll"), _pdfUrl); }, 350);
});

function closeDoc(){
  var dv = document.getElementById("docViewer");
  dv.classList.remove("show","pdf","html");
  _pdfUrl = null;
  var frame = document.getElementById("dvFrame");
  frame.onload = null;
  frame.src = "about:blank";
  document.getElementById("pdfScroll").innerHTML = "";
}

function renderPdf(container, url){
  container.innerHTML = '<div class="dvmsg">Loading\u2026</div>';
  if (!window.pdfjsLib) {
    container.innerHTML = '<div class="dvmsg">The PDF viewer did not load. Reconnect once to fetch it, or open presentation.pdf directly.</div>';
    return;
  }

  var dpr = Math.min(window.devicePixelRatio || 1, 3);   // match the screen's real pixel density
  var KEEP = 4;                                          // pages kept drawn at once, to spare memory

  pdfjsLib.getDocument(url).promise.then(function(pdf){
    container.innerHTML = "";
    var slots = [];

    function cssWidth(){ return Math.max(80, container.clientWidth - 20); }

    function draw(i){
      var slot = slots[i];
      if (slot.busy || slot.canvas) return;
      slot.busy = true;
      pdf.getPage(i + 1).then(function(page){
        var vp = page.getViewport({ scale:1 });
        var scale = Math.max(0.2, cssWidth() / vp.width);
        var v2 = page.getViewport({ scale: scale * dpr });
        var canvas = document.createElement("canvas");
        canvas.width = Math.round(v2.width);
        canvas.height = Math.round(v2.height);
        canvas.style.width = Math.round(v2.width / dpr) + "px";
        canvas.style.height = Math.round(v2.height / dpr) + "px";
        slot.el.innerHTML = "";
        slot.el.appendChild(canvas);
        slot.canvas = canvas;
        slot.busy = false;
        page.render({ canvasContext:canvas.getContext("2d"), viewport:v2 });
        prune(i);
      }).catch(function(){ slot.busy = false; });
    }

    function prune(centre){
      for (var j = 0; j < slots.length; j++){
        if (Math.abs(j - centre) <= KEEP || !slots[j].canvas) continue;
        slots[j].el.innerHTML = "";
        slots[j].canvas = null;
      }
    }

    var chain = Promise.resolve();
    for (var n = 1; n <= pdf.numPages; n++){
      (function(pn){
        chain = chain.then(function(){
          return pdf.getPage(pn).then(function(page){
            var vp = page.getViewport({ scale:1 });
            var w = cssWidth(), h = Math.round(w * vp.height / vp.width);
            var holder = document.createElement("div");
            holder.className = "pdfpage";
            holder.style.width = w + "px";
            holder.style.height = h + "px";
            container.appendChild(holder);
            slots.push({ el:holder, canvas:null, busy:false });
          });
        });
      })(n);
    }

    return chain.then(function(){
      function visible(){
        var top = container.scrollTop, bottom = top + container.clientHeight;
        for (var i = 0; i < slots.length; i++){
          var el = slots[i].el;
          if (el.offsetTop < bottom + container.clientHeight &&
              el.offsetTop + el.offsetHeight > top - container.clientHeight) draw(i);
        }
      }
      container.onscroll = visible;
      visible();
    });
  }).catch(function(){
    container.innerHTML = '<div class="dvmsg">Could not load the presentation. Check that the PDF sits beside index.html.</div>';
  });
}

function closePlayer(){
  var player = document.getElementById("player");
  var vid = document.getElementById("playerVideo");
  if (vid) { vid.pause(); vid.removeAttribute("src"); vid.load(); }
  if (player) player.classList.remove("show");
}

/* ================= LOGIN ================= */
function requestLogin(i){
  var m = MODULES[i];
  pendingModuleIndex = i;
  document.getElementById("loginLabel").textContent =
    "Enter credentials for Form " + m.letter + " \u2014 " + m.title;
  document.getElementById("loginErrorMsg").style.display = "none";
  document.getElementById("loginUsername").value = "";
  document.getElementById("loginPassword").value = "";
  document.getElementById("loginOverlay").style.display = "flex";
  setTimeout(function(){ document.getElementById("loginUsername").focus(); }, 50);
}

function submitLogin(){
  var i = pendingModuleIndex;
  if (i === null) return;
  var m = MODULES[i];
  var creds = FORM_CREDENTIALS[m.letter];
  var userField = document.getElementById("loginUsername");
  var passField = document.getElementById("loginPassword");

  if (creds && userField.value.trim() === creds.username && passField.value === creds.password) {
    unlockedForms[m.letter] = true;
    try { sessionStorage.setItem("mocm_unlocked_final", JSON.stringify(unlockedForms)); } catch(e) {}
    closeLoginModal();
    if (currentModule === i) goModule(i);
    openDoc("html", "Data Collection \u00B7 " + m.title, m.data, 0);
  } else {
    document.getElementById("loginErrorMsg").style.display = "block";
    userField.style.animation = "shake 0.3s ease";
    passField.style.animation = "shake 0.3s ease";
    userField.style.borderColor = "#dc3545";
    passField.style.borderColor = "#dc3545";
    userField.value = ""; passField.value = "";
    setTimeout(function(){
      userField.style.animation = ""; passField.style.animation = "";
      userField.style.borderColor = "#e0e6ed"; passField.style.borderColor = "#e0e6ed";
      userField.focus();
    }, 350);
  }
}

function closeLoginModal(){
  document.getElementById("loginOverlay").style.display = "none";
  pendingModuleIndex = null;
}

document.getElementById("loginOverlay").addEventListener("click", function(e){
  if (e.target === this) closeLoginModal();
});

/* ================= ONLINE STATUS ================= */
function updateOnlineStatus(){
  var dot = document.getElementById("statusDot");
  var txt = document.getElementById("statusTxt");
  var badge = document.getElementById("statusBadge");
  if (!dot || !txt || !badge) return;
  if (navigator.onLine) {
    dot.className = "status-dot online";
    txt.textContent = "System ready";
    badge.textContent = "ONLINE";
    badge.style.background = "#e8f5e9";
    badge.style.color = "#28a745";
  } else {
    dot.className = "status-dot offline";
    txt.textContent = "Offline mode";
    badge.textContent = "OFFLINE";
    badge.style.background = "#fee2e2";
    badge.style.color = "#dc3545";
  }
}
window.addEventListener("online", updateOnlineStatus);
window.addEventListener("offline", updateOnlineStatus);

/* ================= BACK / ESC HANDLING ================= */
window.addEventListener("popstate", function(){
  if (document.getElementById("docViewer").classList.contains("show")) closeDoc();
  else if (currentModule !== null) goHome();
  history.pushState(null, "", location.href);
});
history.pushState(null, "", location.href);

document.addEventListener("keydown", function(e){
  if (e.key !== "Escape") return;
  if (document.getElementById("loginOverlay").style.display === "flex") closeLoginModal();
  else if (document.getElementById("docViewer").classList.contains("show")) closeDoc();
  else if (currentModule !== null) goHome();
});

/* ================= INIT ================= */
document.getElementById("year").textContent = new Date().getFullYear();
goHome();
</script>
